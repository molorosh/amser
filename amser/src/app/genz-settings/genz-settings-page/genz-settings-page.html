<div class="genz-settings-container">
  <h1>GenZ Settings</h1>

  <div class="settings-section">
    <div class="setting-item">
      <div class="setting-info">
        <span class="setting-label">Dark Mode</span>
        <span class="setting-description">Switch to a white-on-black style</span>
      </div>
      <p-toggleswitch
        data-testid="settings_dark_mode"
        [ngModel]="darkMode()"
        (ngModelChange)="onDarkModeChange($event)"
      />
    </div>

    <div class="setting-item workdays-setting">
      <div class="setting-info">
        <span class="setting-label">Work Days</span>
        <span class="setting-description">Select which days are work days. If none are selected, all days are considered work days.</span>
      </div>
      <div class="workday-checkboxes">
        @for (day of days(); track day.value) {
          <label class="workday-checkbox">
            <p-checkbox
              [binary]="true"
              [ngModel]="day.checked"
              (ngModelChange)="onWorkdayChange(day.value, $event)"
              [attr.data-testid]="'settings_workday_' + day.label.toLowerCase()"
            />
            <span>{{ day.label }}</span>
          </label>
        }
      </div>
    </div>
  </div>
</div>
