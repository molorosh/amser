<div class="sprints-container">
  <div class="header">
    <h1>Sprints</h1>
    <p-button label="New Sprint" icon="pi pi-plus" (onClick)="openNewSprintDialog()" />
  </div>

  <p-table [value]="sprints()" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Current</th>
        <th style="width: 150px">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-sprint>
      <tr>
        <td>{{ sprint.name }}</td>
        <td>{{ sprint.startDate | date: 'mediumDate' }}</td>
        <td>{{ sprint.endDate | date: 'mediumDate' }}</td>
        <td>
          @if (sprint.isCurrent) {
            <i class="pi pi-check" style="color: green"></i>
          }
        </td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="openEditSprintDialog(sprint)" />
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(sprint)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5" class="empty-message">
          No sprints found. Click "New Sprint" to create one.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="isEditing() ? 'Edit Sprint' : 'New Sprint'"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '500px' }"
>
  <div class="form-container">
    <div class="field">
      <label for="name">Name *</label>
      <input pInputText id="name" [ngModel]="sprintName()" (ngModelChange)="sprintName.set($event)" class="w-full" />
    </div>

    <div class="field">
      <label for="startDate">Start Date *</label>
      <p-datepicker
        id="startDate"
        [ngModel]="sprintStartDate()"
        (ngModelChange)="sprintStartDate.set($event)"
        dateFormat="dd/mm/yy"
        styleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="endDate">End Date *</label>
      <p-datepicker
        id="endDate"
        [ngModel]="sprintEndDate()"
        (ngModelChange)="sprintEndDate.set($event)"
        dateFormat="dd/mm/yy"
        styleClass="w-full"
      />
    </div>

    <div class="field-checkbox">
      <p-checkbox
        inputId="isCurrent"
        [ngModel]="sprintIsCurrent()"
        (ngModelChange)="sprintIsCurrent.set($event)"
        [binary]="true"
      />
      <label for="isCurrent">Current Sprint</label>
    </div>
  </div>

  <ng-template #footer>
    <p-button label="Cancel" [text]="true" (onClick)="cancelDialog()" />
    <p-button label="Save" (onClick)="saveSprint()" [disabled]="!isFormValid()" />
  </ng-template>
</p-dialog>

<p-confirmDialog />
