<div class="tasks-container">
  <div class="header">
    <h1>Tasks</h1>
    <p-button label="New Task" icon="pi pi-plus" (onClick)="openNewTaskDialog()" />
  </div>

  <p-table [value]="tasks()" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Auto Allocate</th>
        <th>Description</th>
        <th>URL</th>
        <th style="width: 150px">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-task>
      <tr>
        <td>{{ task.name }}</td>
        <td>{{ task.taskType ?? 'WorkItem' }}</td>
        <td>
          @if (task.autoAllocate) {
            <i class="pi pi-check"></i>
          }
        </td>
        <td>{{ task.description }}</td>
        <td>
          @if (task.url) {
            <a [href]="task.url" target="_blank" rel="noopener">{{ task.url }}</a>
          }
        </td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="openEditTaskDialog(task)" />
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(task)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="empty-message">
          No tasks found. Click "New Task" to create one.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="isEditing() ? 'Edit Task' : 'New Task'"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '500px' }"
>
  <div class="form-container">
    <div class="field">
      <label for="name">Name *</label>
      <input pInputText id="name" [ngModel]="taskName()" (ngModelChange)="taskName.set($event)" class="w-full" />
    </div>

    <div class="field">
      <label for="taskType">Type *</label>
      <p-select
        id="taskType"
        [options]="taskTypeOptions"
        [ngModel]="taskType()"
        (ngModelChange)="taskType.set($event)"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea
        pTextarea
        id="description"
        [ngModel]="taskDescription()"
        (ngModelChange)="taskDescription.set($event)"
        rows="3"
        class="w-full"
      ></textarea>
    </div>

    <div class="field">
      <label for="url">URL</label>
      <input pInputText id="url" [ngModel]="taskUrl()" (ngModelChange)="taskUrl.set($event)" class="w-full" />
    </div>

    <div class="field-checkbox">
      <p-checkbox
        inputId="autoAllocate"
        [ngModel]="taskAutoAllocate()"
        (ngModelChange)="taskAutoAllocate.set($event)"
        [binary]="true"
      />
      <label for="autoAllocate">Auto Allocate</label>
    </div>
  </div>

  <ng-template #footer>
    <p-button label="Cancel" [text]="true" (onClick)="cancelDialog()" />
    <p-button label="Save" (onClick)="saveTask()" [disabled]="!taskName().trim()" />
  </ng-template>
</p-dialog>

<p-confirmDialog />
